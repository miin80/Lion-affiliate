<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Logo badge -->
  <rect x="540" y="120" width="120" height="120" rx="28" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="600" y="212" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#fff">L</text>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#fff">Minh Quang Reviews</text>
  <!-- Tagline -->
  <text x="600" y="402" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="500" fill="#fff" opacity="0.94">Đồ tốt mình dùng mỗi ngày</text>
  <!-- Platform badges -->
  <g transform="translate(380, 470)">
    <rect width="160" height="50" rx="25" fill="rgba(0,0,0,0.22)"/>
    <text x="80" y="33" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="700" fill="#fff">Shopee</text>
  </g>
  <g transform="translate(560, 470)">
    <rect width="200" height="50" rx="25" fill="rgba(0,0,0,0.22)"/>
    <text x="100" y="33" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="700" fill="#fff">TikTok Shop</text>
  </g>
  <g transform="translate(780, 470)">
    <rect width="160" height="50" rx="25" fill="rgba(0,0,0,0.22)"/>
    <text x="80" y="33" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="700" fill="#fff">Lazada</text>
  </g>
</svg>
